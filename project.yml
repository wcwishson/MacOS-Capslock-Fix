name: MacInputTweak
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 6.0
schemes:
  MacInputTweak:
    build:
      targets:
        MacInputTweak: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
targets:
  MacInputTweak:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/MacInputTweak
      - path: Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleShortVersionString: "2.0.0"
        CFBundleVersion: "200"
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wcwishson.macinputtweak
        PRODUCT_NAME: Mac Input Tweak
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7YGZZNN9DL
        CODE_SIGN_IDENTITY: Apple Development
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_DEBUG_DYLIB: NO
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_LSMinimumSystemVersion: "13.0"
        INFOPLIST_KEY_LSUIElement: NO
        INFOPLIST_KEY_NSHighResolutionCapable: YES
